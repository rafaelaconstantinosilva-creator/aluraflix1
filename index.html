<DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosméticos Beauty App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f1a8d5;
    }

    header {
      background: hsl(317, 95%, 84%);
      color: rgb(5, 77, 119);
      padding: 20px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      width: 200px;
      margin: 15px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #ec91dd;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #fc8dbd;
    }

    #cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 250px;
      height: 100%;
      background: #fff;
      border-left: 2px solid #f07ca7;
      padding: 15px;
      overflow-y: auto;
    }

    #cart h2 {
      color: #98cbf5;
    }

    .titulo{
      color: black;
    }
  </style>
</head>

<body>

<header>
  <h1><span class="titulo">💄 Beauty Cosméticos</span></h1>
  <p>Seu app simples de compras de maquiagem</p>
</header>

<div class="container">
  
  <div class="product">
    <img src="https://via.placeholder.com/150" />
    <h3>Batom Matte</h3>
    <p>R$ 29,90</p>
    <button onclick="addToCart('Batom Matte')">Adicionar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150" />
    <h3>Base Líquida</h3>
    <p>R$ 49,90</p>
    <button onclick="addToCart('Base Líquida')">Adicionar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150" />
    <h3>Máscara de Cílios</h3>
    <p>R$ 39,90</p>
    <button onclick="addToCart('Máscara de Cílios')">Adicionar</button>
  </div>

</div>

<div id="cart">
  <h2>🛒 Carrinho</h2>
  <ul id="cartItems"></ul>
</div>

<script>
  function addToCart(product) {
    const list = document.getElementById("cartItems");
    const item = document.createElement("li");
    item.textContent = product;
    list.appendChild(item);
  }
</script>

</body>
</html>
